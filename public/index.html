<!DOCTYPE html>
<html lang="en" data-theme="cozy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1b1510" />

  <title>Mischess | The most refreshing way to play chess</title>
  <meta name="description" content="A cozy place to play serious chess. Real-time multiplayer, Stockfish AI, fair-play protection, and zero ads." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Mischess | The most refreshing way to play chess" />
  <meta property="og:description" content="Free, fast, fair online chess. Real-time multiplayer with built-in fair-play protection." />
  <meta property="og:image" content="/img/og.svg" />
  <meta property="og:url" content="/" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mischess | The most refreshing way to play chess" />
  <meta name="twitter:description" content="Free, fast, fair online chess." />
  <meta name="twitter:image" content="/img/og.svg" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
  <link rel="apple-touch-icon" href="/img/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />

  <script>
    // Apply saved theme before any CSS paints to prevent flash of wrong theme
    (function() {
      try {
        var saved = localStorage.getItem('mischess:theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="app">
    <header class="site-header">
      <div class="header-inner">
        <a href="#/" class="brand" data-link>
          <svg class="brand-mark" viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
            <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M10 22 L10 18 L12 16 L11 10 L14 10 L14 8 L18 8 L18 10 L21 10 L20 16 L22 18 L22 22 Z"
              fill="currentColor" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round"/>
          </svg>
          <span class="brand-name">Mischess</span>
        </a>
        <nav class="main-nav">
          <a href="#/play" data-link>Play</a>
          <a href="#/leaderboard" data-link>Leaderboard</a>
          <a href="#/watch" data-link>Watch</a>
          <a href="#/friends" data-link>Friends</a>
          <a href="#/messages" data-link>Messages</a>
          <a href="#/settings" data-link>Settings</a>
        </nav>
        <div class="auth-area" id="auth-area">
          <a href="#/login" class="btn btn-ghost" data-link>Sign in</a>
          <a href="#/register" class="btn btn-primary" data-link>Register</a>
        </div>
      </div>
    </header>

    <main id="view"></main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div>Mischess &middot; free chess, forever</div>
        <div class="footer-links">
          <a href="#/about" data-link>About</a>
          <a href="#/fairplay" data-link>Fair Play</a>
          <a href="#/leaderboard" data-link>Leaderboard</a>
          <a href="#/settings" data-link>Settings</a>
        </div>
      </div>
    </footer>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>
  <div id="cheat-warning-mount"></div>
  <div id="update-banner-mount"></div>

  <script src="/js/chess.min.js"></script>
  <script src="/js/app.js" type="module"></script>

  <script>
    // ----- Service Worker registration with update prompt -----
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        try {
          const reg = await navigator.serviceWorker.register('/sw.js');
          // Listen for new SW versions
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateBanner(newWorker);
              }
            });
          });
          // Check for updates every 60s while open
          setInterval(() => reg.update().catch(() => {}), 60_000);
        } catch (e) {
          console.warn('[sw] registration failed', e);
        }
      });

      // Reload page once the new SW takes control (after user accepts)
      let refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (refreshing) return;
        refreshing = true;
        window.location.reload();
      });
    }

    function showUpdateBanner(worker) {
      const mount = document.getElementById('update-banner-mount');
      if (!mount) return;
      mount.innerHTML = '';
      const banner = document.createElement('div');
      banner.className = 'update-banner';
      banner.innerHTML = `
        <span class="update-text">A new version of Mischess is available.</span>
        <button class="btn btn-primary btn-sm" id="update-refresh">Refresh</button>
        <button class="btn btn-ghost btn-sm" id="update-dismiss" aria-label="Dismiss">&times;</button>
      `;
      mount.appendChild(banner);
      document.getElementById('update-refresh').addEventListener('click', () => {
        worker.postMessage({ type: 'SKIP_WAITING' });
      });
      document.getElementById('update-dismiss').addEventListener('click', () => {
        banner.remove();
      });
    }
  </script>
</body>
</html>
