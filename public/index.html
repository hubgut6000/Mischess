<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1116" />
  <title>Mischess - Free Online Chess</title>
  <meta name="description" content="Mischess - free, fast, fair online chess. Play, learn, and improve with real-time games and advanced anti-cheat." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" type="image/svg+xml" href="/img/favicon.svg" />
</head>
<body>
  <div id="app">
    <header class="site-header">
      <div class="header-inner">
        <a href="#/" class="brand" data-link>
          <svg class="brand-mark" viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
            <rect x="2" y="2" width="28" height="28" rx="4" fill="none" stroke="currentColor" stroke-width="2"/>
            <path d="M10 22 L10 18 L12 16 L11 10 L14 10 L14 8 L18 8 L18 10 L21 10 L20 16 L22 18 L22 22 Z"
              fill="currentColor" stroke="currentColor" stroke-width="0.5" stroke-linejoin="round"/>
          </svg>
          <span class="brand-name">Mischess</span>
        </a>
        <nav class="main-nav">
          <a href="#/play" data-link>Play</a>
          <a href="#/leaderboard" data-link>Leaderboard</a>
          <a href="#/watch" data-link>Watch</a>
          <a href="#/settings" data-link>Settings</a>
          <a href="#/about" data-link>About</a>
        </nav>
        <div class="auth-area" id="auth-area">
          <a href="#/login" class="btn btn-ghost" data-link>Sign in</a>
          <a href="#/register" class="btn btn-primary" data-link>Register</a>
        </div>
      </div>
    </header>

    <main id="view"></main>

    <footer class="site-footer">
      <div class="footer-inner">
        <div>Mischess &middot; free chess for everyone</div>
        <div class="footer-links">
          <a href="#/about" data-link>About</a>
          <a href="#/fairplay" data-link>Fair Play</a>
          <a href="#/leaderboard" data-link>Leaderboard</a>
        </div>
      </div>
    </footer>
  </div>

  <div id="toast-container" aria-live="polite"></div>

  <!-- chess.js via CDN-free embed: we'll use our own simple logic OR load from our own bundle -->
  <script src="/js/chess.min.js"></script>
  <script src="/js/app.js" type="module"></script>
</body>
</html>
