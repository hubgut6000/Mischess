<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#231c16"/>
      <stop offset="1" stop-color="#1b1510"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.15" cy="0.1" r="0.6">
      <stop offset="0" stop-color="#e9a65e" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#e9a65e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.95" r="0.5">
      <stop offset="0" stop-color="#e9a65e" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#e9a65e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Decorative chess board on the right -->
  <g transform="translate(720, 95) rotate(-6 220 220)">
    <rect x="-12" y="-12" width="464" height="464" rx="6" fill="#3a2516"/>
    <g>
      <!-- 8x8 board -->
      <g transform="translate(0,0)">
        <!-- Row 0 -->
        <rect x="0"   y="0"   width="55" height="55" fill="#f0dcb4"/>
        <rect x="55"  y="0"   width="55" height="55" fill="#a8764a"/>
        <rect x="110" y="0"   width="55" height="55" fill="#f0dcb4"/>
        <rect x="165" y="0"   width="55" height="55" fill="#a8764a"/>
        <rect x="220" y="0"   width="55" height="55" fill="#f0dcb4"/>
        <rect x="275" y="0"   width="55" height="55" fill="#a8764a"/>
        <rect x="330" y="0"   width="55" height="55" fill="#f0dcb4"/>
        <rect x="385" y="0"   width="55" height="55" fill="#a8764a"/>
        <!-- Row 1 -->
        <rect x="0"   y="55"  width="55" height="55" fill="#a8764a"/>
        <rect x="55"  y="55"  width="55" height="55" fill="#f0dcb4"/>
        <rect x="110" y="55"  width="55" height="55" fill="#a8764a"/>
        <rect x="165" y="55"  width="55" height="55" fill="#f0dcb4"/>
        <rect x="220" y="55"  width="55" height="55" fill="#a8764a"/>
        <rect x="275" y="55"  width="55" height="55" fill="#f0dcb4"/>
        <rect x="330" y="55"  width="55" height="55" fill="#a8764a"/>
        <rect x="385" y="55"  width="55" height="55" fill="#f0dcb4"/>
        <!-- Row 2 -->
        <rect x="0"   y="110" width="55" height="55" fill="#f0dcb4"/>
        <rect x="55"  y="110" width="55" height="55" fill="#a8764a"/>
        <rect x="110" y="110" width="55" height="55" fill="#f0dcb4"/>
        <rect x="165" y="110" width="55" height="55" fill="#a8764a"/>
        <rect x="220" y="110" width="55" height="55" fill="#f0dcb4"/>
        <rect x="275" y="110" width="55" height="55" fill="#a8764a"/>
        <rect x="330" y="110" width="55" height="55" fill="#f0dcb4"/>
        <rect x="385" y="110" width="55" height="55" fill="#a8764a"/>
        <!-- Row 3 (highlighted move) -->
        <rect x="0"   y="165" width="55" height="55" fill="#a8764a"/>
        <rect x="55"  y="165" width="55" height="55" fill="#f0dcb4"/>
        <rect x="110" y="165" width="55" height="55" fill="#a8764a"/>
        <rect x="165" y="165" width="55" height="55" fill="#e9a65e" opacity="0.55"/>
        <rect x="220" y="165" width="55" height="55" fill="#a8764a"/>
        <rect x="275" y="165" width="55" height="55" fill="#f0dcb4"/>
        <rect x="330" y="165" width="55" height="55" fill="#a8764a"/>
        <rect x="385" y="165" width="55" height="55" fill="#f0dcb4"/>
        <!-- Row 4 -->
        <rect x="0"   y="220" width="55" height="55" fill="#f0dcb4"/>
        <rect x="55"  y="220" width="55" height="55" fill="#a8764a"/>
        <rect x="110" y="220" width="55" height="55" fill="#f0dcb4"/>
        <rect x="165" y="220" width="55" height="55" fill="#a8764a"/>
        <rect x="220" y="220" width="55" height="55" fill="#f0dcb4"/>
        <rect x="275" y="220" width="55" height="55" fill="#a8764a"/>
        <rect x="330" y="220" width="55" height="55" fill="#f0dcb4"/>
        <rect x="385" y="220" width="55" height="55" fill="#a8764a"/>
        <!-- Row 5 -->
        <rect x="0"   y="275" width="55" height="55" fill="#a8764a"/>
        <rect x="55"  y="275" width="55" height="55" fill="#f0dcb4"/>
        <rect x="110" y="275" width="55" height="55" fill="#a8764a"/>
        <rect x="165" y="275" width="55" height="55" fill="#f0dcb4"/>
        <rect x="220" y="275" width="55" height="55" fill="#a8764a"/>
        <rect x="275" y="275" width="55" height="55" fill="#f0dcb4"/>
        <rect x="330" y="275" width="55" height="55" fill="#a8764a"/>
        <rect x="385" y="275" width="55" height="55" fill="#f0dcb4"/>
        <!-- Row 6 -->
        <rect x="0"   y="330" width="55" height="55" fill="#f0dcb4"/>
        <rect x="55"  y="330" width="55" height="55" fill="#a8764a"/>
        <rect x="110" y="330" width="55" height="55" fill="#f0dcb4"/>
        <rect x="165" y="330" width="55" height="55" fill="#a8764a"/>
        <rect x="220" y="330" width="55" height="55" fill="#f0dcb4"/>
        <rect x="275" y="330" width="55" height="55" fill="#a8764a"/>
        <rect x="330" y="330" width="55" height="55" fill="#f0dcb4"/>
        <rect x="385" y="330" width="55" height="55" fill="#a8764a"/>
        <!-- Row 7 -->
        <rect x="0"   y="385" width="55" height="55" fill="#a8764a"/>
        <rect x="55"  y="385" width="55" height="55" fill="#f0dcb4"/>
        <rect x="110" y="385" width="55" height="55" fill="#a8764a"/>
        <rect x="165" y="385" width="55" height="55" fill="#f0dcb4"/>
        <rect x="220" y="385" width="55" height="55" fill="#a8764a"/>
        <rect x="275" y="385" width="55" height="55" fill="#f0dcb4"/>
        <rect x="330" y="385" width="55" height="55" fill="#a8764a"/>
        <rect x="385" y="385" width="55" height="55" fill="#f0dcb4"/>
      </g>
    </g>
  </g>

  <!-- Title -->
  <text x="80" y="220" font-family="Fraunces, Georgia, serif" font-size="92" font-weight="700" fill="#f6ecdb" letter-spacing="-2">Mischess</text>
  <text x="80" y="320" font-family="Fraunces, Georgia, serif" font-size="42" font-weight="500" fill="#d7c3a3" font-style="italic">Chess, slowly.</text>

  <!-- Tagline -->
  <text x="80" y="430" font-family="Inter, sans-serif" font-size="24" fill="#9f8a70">A cozy place to play serious chess.</text>
  <text x="80" y="465" font-family="Inter, sans-serif" font-size="24" fill="#9f8a70">Free, fair, fast.</text>

  <!-- Bottom kicker -->
  <text x="80" y="560" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#e9a65e" letter-spacing="3">FREE FOREVER · NO ADS · OPEN SOURCE</text>
</svg>
