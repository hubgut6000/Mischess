databases:
  - name: mischess-db
    plan: free
    postgresMajorVersion: 16

services:
  - type: web
    name: mischess
    env: node
    region: oregon
    plan: starter
    buildCommand: |
      apt-get update && apt-get install -y stockfish || true
      npm install
    startCommand: node server/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 20.18.1
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mischess-db
          property: connectionString
      - key: STOCKFISH_PATH
        value: stockfish
      - key: ANALYSIS_DEPTH
        value: "12"
